services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./ml-simulator:/app/ml-simulator
      - ./data-scripts:/app/data-scripts
      - ./backend/uploads:/app/backend/uploads
      - ./backend/cache:/app/backend/cache
      - ./backend/sessions:/app/backend/sessions
      - ./backend/shares:/app/backend/shares
    environment:
      - PORT=5000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped
